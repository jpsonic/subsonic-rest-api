name: Deploy to GitHub Packages

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Write Maven settings.xml
      shell: bash
      env:
        GH_USER: ${{ github.actor }}
        GH_PAT: ${{ secrets.JPSONIC_PACKAGE_TOKEN }}
      run: |
        mkdir -p ~/.m2
        printf '<settings><servers><server><id>jpsonic-packages-repo</id><username>%s</username><password>%s</password></server></servers></settings>' \
          "$GH_USER" \
          "$GH_PAT" \
          > ~/.m2/settings.xml
    - name: Publish to GitHub Packages
      run: mvn --batch-mode clean deploy
